
<!DOCTYPE html>

    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      html, body {
        padding: 0;
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }
      /* Hide scrollbar for native feel */
      ::-webkit-scrollbar { width: 0; height: 0; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      /* Smooth page transitions */
      main > div { animation: pageIn 0.2s ease-out; }
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* Touch ripple effect */
      button, a { -webkit-tap-highlight-color: transparent; }
    </style>
    <title>BusWay Pro | Enterprise Fleet Manager</title>

</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden selection:bg-primary/10">
    <div id="root"></div>
    <script>
      // Suppress benign Vite websocket errors in the preview environment
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
          return;
        }
        originalError.apply(console, args);
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && event.reason.message.includes('WebSocket')) {
          event.preventDefault();
        }
      });

      // Service worker: register on production, auto-reload when a new SW activates.
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function (reg) {
              if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              reg.addEventListener('updatefound', function () {
                var nw = reg.installing;
                if (!nw) return;
                nw.addEventListener('statechange', function () {
                  if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                    nw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function (err) {
              console.warn('SW registration failed:', err);
            });

          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }

      // Emergency cache reset: ?reset=1 unregisters all SWs and clears caches once.
      if (location.search.indexOf('reset=1') !== -1 && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
            location.replace(location.pathname);
          });
        }
      }
    </script>
<script type="module" src="/index.tsx"></script>
