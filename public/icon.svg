<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1D4ED8"/>
  <!-- Bus body -->
  <rect x="80" y="150" width="352" height="200" rx="48" fill="#FFFFFF"/>
  <!-- Bus windows row -->
  <rect x="104" y="174" width="304" height="72" rx="20" fill="#DBEAFE"/>
  <!-- Window dividers -->
  <rect x="200" y="174" width="4" height="72" fill="#93C5FD"/>
  <rect x="308" y="174" width="4" height="72" fill="#93C5FD"/>
  <!-- Yellow stripe -->
  <rect x="80" y="264" width="352" height="44" fill="#F59E0B"/>
  <!-- Front bumper -->
  <rect x="80" y="330" width="352" height="20" rx="8" fill="#1E3A8A"/>
  <!-- Left wheel -->
  <circle cx="160" cy="370" r="44" fill="#0F172A"/>
  <circle cx="160" cy="370" r="22" fill="#64748B"/>
  <circle cx="160" cy="370" r="8" fill="#CBD5E1"/>
  <!-- Right wheel -->
  <circle cx="352" cy="370" r="44" fill="#0F172A"/>
  <circle cx="352" cy="370" r="22" fill="#64748B"/>
  <circle cx="352" cy="370" r="8" fill="#CBD5E1"/>
  <!-- Headlights -->
  <rect x="84" y="186" width="28" height="20" rx="6" fill="#FDE68A"/>
  <rect x="400" y="186" width="28" height="20" rx="6" fill="#FDE68A"/>
</svg>
