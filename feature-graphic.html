<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayPro Pro - Feature Graphic</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 1024px;
            height: 500px;
            border: 2px solid #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .save-info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .download-btn {
            display: block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        .download-btn:hover {
            background: #1e3a8a;
        }
    </style>
</head>
<body>
    <div>
        <div class="container">
            <svg viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Dark gradient background -->
                <defs>
                    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="busGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
                    </linearGradient>
                </defs>

                <!-- Background -->
                <rect width="1024" height="500" fill="url(#bgGradient)"/>

                <!-- Accent shapes (top right) - IMPROVED -->
                <circle cx="950" cy="50" r="140" fill="#fbbf24" opacity="0.08"/>
                <circle cx="980" cy="80" r="100" fill="#1e40af" opacity="0.12"/>
                <circle cx="1000" cy="450" r="180" fill="#1e40af" opacity="0.1"/>

                <!-- School Bus (Left side) - IMPROVED -->
                <!-- Bus body main -->
                <rect x="50" y="200" width="300" height="140" rx="12" fill="url(#busGradient)" stroke="#0f172a" stroke-width="2"/>
                
                <!-- Bus roof -->
                <path d="M 50 200 L 80 140 L 270 120 L 350 145 L 350 200" fill="#1e3a8a" stroke="#0f172a" stroke-width="2"/>
                
                <!-- Roof accent -->
                <rect x="50" y="195" width="300" height="8" fill="#fbbf24"/>
                
                <!-- Front windshield (large) -->
                <rect x="65" y="150" width="65" height="50" rx="4" fill="#a5d8ff" opacity="0.9" stroke="#0ea5e9" stroke-width="1.5"/>
                <line x1="97" y1="150" x2="97" y2="200" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
                
                <!-- Side windows (4) -->
                <rect x="140" y="155" width="35" height="35" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="185" y="155" width="35" height="35" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="230" y="155" width="35" height="35" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="275" y="155" width="35" height="35" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                
                <!-- Bottom passenger windows (3) -->
                <rect x="70" y="220" width="50" height="50" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="135" y="220" width="50" height="50" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="200" y="220" width="50" height="50" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                <rect x="265" y="220" width="50" height="50" rx="3" fill="#a5d8ff" opacity="0.85" stroke="#0ea5e9" stroke-width="1"/>
                
                <!-- Yellow bumper stripe -->
                <rect x="50" y="330" width="300" height="15" fill="#fbbf24" stroke="#1f2937" stroke-width="1"/>
                
                <!-- Wheels -->
                <g>
                  <circle cx="100" cy="360" r="32" fill="#0f172a" stroke="#374151" stroke-width="2"/>
                  <circle cx="100" cy="360" r="24" fill="#374151"/>
                  <circle cx="100" cy="360" r="18" fill="#4b5563"/>
                  <circle cx="100" cy="360" r="12" fill="#1f2937"/>
                </g>
                <g>
                  <circle cx="300" cy="360" r="32" fill="#0f172a" stroke="#374151" stroke-width="2"/>
                  <circle cx="300" cy="360" r="24" fill="#374151"/>
                  <circle cx="300" cy="360" r="18" fill="#4b5563"/>
                  <circle cx="300" cy="360" r="12" fill="#1f2937"/>
                </g>
                
                <!-- Headlights -->
                <circle cx="60" cy="235" r="8" fill="#fbbf24" opacity="0.8"/>
                <circle cx="75" cy="235" r="8" fill="#fbbf24" opacity="0.8"/>
                
                <!-- Door handle -->
                <rect x="115" y="295" width="6" height="15" rx="3" fill="#fbbf24"/>

                <!-- Main Text (Right side) -->
                <!-- App name -->
                <text x="420" y="125" font-size="80" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif" letter-spacing="0">
                    WayP
                </text>
                
                <!-- "Pro" highlight - yellow -->
                <text x="690" y="125" font-size="80" font-weight="800" fill="#fbbf24" font-family="Arial, sans-serif" letter-spacing="0">
                    Pro
                </text>
                
                <!-- Tagline with better styling -->
                <text x="420" y="185" font-size="38" fill="#ffffff" font-family="Arial, sans-serif" font-weight="600" letter-spacing="0.5">
                    School Bus Fee Manager
                </text>
                
                <!-- Subtitle - better contrast -->
                <text x="420" y="235" font-size="24" fill="#cbd5e1" font-family="Arial, sans-serif" font-weight="400" letter-spacing="0.5">
                    Safe • Secure • Real-time Tracking
                </text>
                
                <!-- Features icons and text -->
                <!-- GPS icon (Map Pin) -->
                <g>
                  <circle cx="440" cy="335" r="14" fill="#fbbf24"/>
                  <path d="M 440 315 C 432 315 426 321 426 329 C 426 339 440 355 440 355 C 440 355 454 339 454 329 C 454 321 448 315 440 315" fill="#1e3a8a" stroke="#fbbf24" stroke-width="1.5"/>
                  <circle cx="440" cy="329" r="4" fill="#fbbf24"/>
                </g>
                <text x="465" y="343" font-size="20" fill="#e0f2fe" font-family="Arial, sans-serif" font-weight="500">Live Bus Tracking</text>
                
                <!-- Payment icon (Credit Card) -->
                <g>
                  <rect x="430" y="370" width="28" height="20" rx="2" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
                  <line x1="430" y1="381" x2="458" y2="381" stroke="#fbbf24" stroke-width="2"/>
                  <rect x="433" y="385" width="8" height="4" fill="#fbbf24" opacity="0.7"/>
                </g>
                <text x="465" y="388" font-size="20" fill="#e0f2fe" font-family="Arial, sans-serif" font-weight="500">Easy Payments</text>
                
                <!-- Security icon (Shield) -->
                <g>
                  <path d="M 444 405 L 432 415 L 432 425 Q 432 437 444 444 Q 456 437 456 425 L 456 415 Z" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round"/>
                  <polyline points="440,425 444,430 452,418" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                <text x="465" y="433" font-size="20" fill="#e0f2fe" font-family="Arial, sans-serif" font-weight="500">Secure & Private</text>
            </svg>
        </div>

        <div class="save-info">
            <strong>How to save as PNG:</strong><br>
            1. Right-click on the image above<br>
            2. Click "Save image as..." OR use Print (Ctrl+P) → Save as PDF → then convert<br>
            3. Or use: Tools → Screenshots → Full page screenshot
        </div>

        <button class="download-btn" onclick="downloadAsPNG()">📥 Download as PNG (1024×500)</button>
    </div>

    <script>
        function downloadAsPNG() {
            // Create canvas
            const svg = document.querySelector('svg');
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 500;
            
            const ctx = canvas.getContext('2d');
            const svgString = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'wayprro-feature-graphic-1024x500.png';
                link.click();
            };
            
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
        }
    </script>
</body>
</html>
